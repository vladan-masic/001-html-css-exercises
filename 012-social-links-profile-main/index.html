<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link rel="icon" type="image/png" sizes="32x32" href="./assets/images/favicon-32x32.png">

  <link rel="preconnect" href="https://fonts.googleapis.com">

<body>

  <main>
    <article class="card">
      <div class="profile">
        <img src="assets/images/avatar-vladan.png" alt="Vladan Masić" class="profile-image">

      <div class="links">
        <ul class="links-list">
          <li class="links-list-item"><a href="#" class="link">GitHub</a></li>
          <li class="links-list-item"><a href="#" class="link">Frontend Mentor</a></li>
          <li class="links-list-item"><a href="#" class="link">LinkedIn</a></li>
          <li class="links-list-item"><a href="#" class="link">Twitter</a></li>
          <li class="links-list-item"><a href="#" class="link">Instagram</a></li>

      </div>
